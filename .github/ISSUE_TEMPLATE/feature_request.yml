name: Feature Request
description: Propose a new feature or an improvement to an existing one.
title: "feat: "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement. Before submitting, search [existing issues](https://github.com/Command-IDE/terminal-IDE/issues) to avoid duplicates.

        **Themes:** propose new themes in the [themes repository](https://github.com/Command-IDE/cmdide-themes) instead.

  - type: dropdown
    id: area
    attributes:
      label: Feature Area
      description: Which part of the app does this relate to?
      options:
        - Terminal
        - Editor / Fullscreen IDE
        - Built-in commands
        - Plugin system / Plugin SDK
        - Themes
        - Performance panel
        - Ports panel
        - Database panel
        - Preview panel
        - Settings / Configuration
        - Build / Installation
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem or Motivation
      description: What problem does this solve? Why do you want this? Don't describe the solution yet.
      placeholder: "When I'm doing X, I have to Y which is slow/annoying/impossible because Z..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: What would you like to see? How would it work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Other approaches you've thought about, and why you prefer the proposed solution.
    validations:
      required: false

  - type: textarea
    id: prior_art
    attributes:
      label: Prior Art
      description: Does any other tool do something similar? Screenshots or links are helpful.
    validations:
      required: false

  - type: dropdown
    id: willing_to_pr
    attributes:
      label: Would you like to implement this yourself?
      options:
        - "Yes — I'll open a PR"
        - "Maybe — I'd need guidance"
        - "No — I'm requesting it for someone else to implement"
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Anything else — mockups, links, related issues.
    validations:
      required: false
