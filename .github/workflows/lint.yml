name: Lint

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── TypeScript — type check ───────────────────────────────────────────────────
  ts-typecheck:
    name: TypeScript — tsc --noEmit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GH_PAT || github.token }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: app/frontend

      - name: Type check
        run: npx tsc --noEmit
        working-directory: app/frontend

  # ── TypeScript — ESLint ───────────────────────────────────────────────────────
  ts-eslint:
    name: TypeScript — ESLint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GH_PAT || github.token }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: app/frontend

      - name: ESLint
        # max-warnings is intentionally not set: warnings are tracked separately.
        # All actual ESLint errors must be 0 for CI to pass.
        run: npx eslint src
        working-directory: app/frontend

  # ── C/C++ — cppcheck ────────────────────────────────────────────────────────────
  cpp-lint:
    name: C/C++ — cppcheck
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Install cppcheck
        run: sudo apt-get update && sudo apt-get install -y cppcheck

      - name: cppcheck
        run: |
          cppcheck \
            --enable=warning,performance,portability \
            --error-exitcode=1 \
            --inline-suppr \
            --suppress=missingInclude \
            --suppress=unmatchedSuppression \
            -I cpp/src -I cpp/host \
            cpp/src cpp/host cpp/setup

  # ── Auto-fix — ESLint ─────────────────────────────────────────────────────────
  # When ESLint fails on a PR, run `eslint --fix`, commit any resulting changes
  # straight to the PR's branch, and leave a comment summarizing what changed.
  lint-autofix:
    name: Auto-fix — ESLint
    needs: ts-eslint
    if: >-
      always() &&
      needs.ts-eslint.result == 'failure' &&
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          submodules: recursive
          token: ${{ secrets.GH_PAT || github.token }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: app/frontend

      - name: ESLint --fix
        run: npm run lint:fix
        working-directory: app/frontend
        continue-on-error: true

      - name: Commit fixes
        id: commit
        run: |
          if git diff --quiet -- app/frontend/src; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "changed=true" >> "$GITHUB_OUTPUT"
          git diff --stat -- app/frontend/src > /tmp/eslint-fix-stat.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/frontend/src
          git commit -m "fix(frontend): apply eslint --fix"
          for i in 1 2 3 4 5; do
            git push origin HEAD:${{ github.event.pull_request.head.ref }} && break
            echo "Push rejected, rebasing onto latest remote ref (attempt $i)..."
            git fetch origin ${{ github.event.pull_request.head.ref }}
            git rebase origin/${{ github.event.pull_request.head.ref }}
            sleep $((i * 3))
          done

      - name: Comment on PR
        if: steps.commit.outputs.changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const stat = fs.readFileSync('/tmp/eslint-fix-stat.txt', 'utf8');
            const body =
              `## 🔧 Auto-fixed ESLint issues — app/frontend\n\n` +
              "The `ESLint` check failed, so `eslint --fix` was run and the result committed " +
              "directly to this branch:\n\n" +
              "```\n" + stat + "```";
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body,
            });
