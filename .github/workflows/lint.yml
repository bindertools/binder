name: Lint

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── TypeScript — type check ───────────────────────────────────────────────────
  ts-typecheck:
    name: TypeScript — tsc --noEmit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GH_PAT || github.token }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: app/frontend

      - name: Type check
        run: npx tsc --noEmit
        working-directory: app/frontend

  # ── TypeScript — ESLint ───────────────────────────────────────────────────────
  ts-eslint:
    name: TypeScript — ESLint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GH_PAT || github.token }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: app/frontend

      - name: ESLint
        # max-warnings is intentionally not set: warnings are tracked separately.
        # All actual ESLint errors must be 0 for CI to pass.
        run: npx eslint src
        working-directory: app/frontend
