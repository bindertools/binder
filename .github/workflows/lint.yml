name: Lint

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── TypeScript — type check ───────────────────────────────────────────────────
  ts-typecheck:
    name: TypeScript — tsc --noEmit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: app/frontend

      - name: Type check
        run: npx tsc --noEmit
        working-directory: app/frontend

  # ── TypeScript — ESLint ───────────────────────────────────────────────────────
  ts-eslint:
    name: TypeScript — ESLint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: app/frontend

      - name: ESLint
        # --max-warnings 0 treats warnings as errors; lower to a number if the
        # existing codebase has outstanding warnings you're working through.
        run: npx eslint src --max-warnings 20
        working-directory: app/frontend
