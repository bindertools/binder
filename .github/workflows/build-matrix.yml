name: Build Matrix

# Compile the C++ backend on every platform on each PR.
# Catches Windows-only vs Unix-only compilation errors before merge.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: build-matrix-${{ github.ref }}
  cancel-in-progress: true

jobs:

  compile:
    name: Compile — ${{ matrix.os }}
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            shell: pwsh
            npm: npm.cmd
          - os: ubuntu-latest
            shell: bash
            npm: npm
          - os: macos-latest
            shell: bash
            npm: npm

    runs-on: ${{ matrix.os }}

    defaults:
      run:
        shell: ${{ matrix.shell }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GH_PAT || github.token }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev \
            cmake ninja-build libssl-dev

      - name: Bootstrap vcpkg (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          git clone --depth=1 https://github.com/microsoft/vcpkg.git "$HOME/vcpkg"
          "$HOME/vcpkg/bootstrap-vcpkg.sh" -disableMetrics
          echo "VCPKG_ROOT=$HOME/vcpkg" >> $GITHUB_ENV

      - name: Bootstrap vcpkg (Windows)
        if: runner.os == 'Windows'
        run: |
          git clone --depth=1 https://github.com/microsoft/vcpkg.git C:\vcpkg
          C:\vcpkg\bootstrap-vcpkg.bat -disableMetrics
          echo "VCPKG_ROOT=C:\vcpkg" >> $env:GITHUB_ENV

      - name: Build app frontend
        run: ${{ matrix.npm }} ci && ${{ matrix.npm }} run build
        working-directory: app/frontend

      - name: CMake configure
        shell: bash
        run: |
          cmake -B cpp/build -S cpp \
            "-DCMAKE_TOOLCHAIN_FILE=$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" \
            "-DVCPKG_OVERLAY_PORTS=cpp/ports"

      - name: CMake build (compile check)
        shell: bash
        run: cmake --build cpp/build --config Release --target cmdide-host

      - name: TypeScript type check
        run: ${{ matrix.npm }} run typecheck
        working-directory: app/frontend
