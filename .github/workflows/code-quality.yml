name: Code Quality

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: code-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: windows-latest
    timeout-minutes: 45

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install app frontend dependencies
        run: npm.cmd ci
        working-directory: app/frontend

      - name: Install setup frontend dependencies
        run: npm.cmd ci
        working-directory: setup/windows/frontend

      - name: Build app frontend
        run: npm.cmd run build
        working-directory: app/frontend

      - name: Build setup frontend
        run: npm.cmd run build
        working-directory: setup/windows/frontend

      - name: TypeScript type check (app)
        run: npm.cmd run typecheck
        working-directory: app/frontend

      - name: Bootstrap vcpkg
        run: |
          $vcpkgRoot = 'C:\vcpkg'
          if (-not (Test-Path "$vcpkgRoot\vcpkg.exe")) {
            git clone https://github.com/microsoft/vcpkg.git $vcpkgRoot
            & "$vcpkgRoot\bootstrap-vcpkg.bat" -disableMetrics
          }
          echo "VCPKG_ROOT=$vcpkgRoot" >> $env:GITHUB_ENV

      - name: CMake configure
        run: |
          cmake -B cpp/build -S cpp `
            "-DCMAKE_TOOLCHAIN_FILE=$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" `
            "-DVCPKG_OVERLAY_PORTS=cpp/ports"

      - name: CMake build (all targets)
        run: cmake --build cpp/build --config Release

      - name: Verify build outputs
        run: |
          $expected = @(
            'cpp\build\Release\binder-host.exe',
            'cpp\build\Release\binder-setup.exe'
          )
          foreach ($path in $expected) {
            if (-not (Test-Path $path)) {
              throw "Missing expected build output: $path"
            }
            Write-Host "  found: $path" -ForegroundColor Green
          }
