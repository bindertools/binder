name: Dependency & Secret Audit

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    # Weekly full scan — Monday 06:00 UTC
    - cron: '0 6 * * 1'

permissions:
  contents: read
  security-events: write  # for uploading SARIF results

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: audit-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── npm audit — app frontend ──────────────────────────────────────────────────
  npm-audit-app:
    name: npm audit — app/frontend
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci
        working-directory: app/frontend

      - name: Run npm audit
        # Fail only on high or critical vulnerabilities
        run: npm audit --audit-level=high
        working-directory: app/frontend

  # ── Auto-fix — npm audit (app frontend) ──────────────────────────────────────
  # When npm audit flags high/critical vulnerabilities on a PR, try `npm audit fix`
  # on the PR's own branch and open a follow-up PR with the updated lockfile so
  # outdated dependencies are easy to review and merge separately.
  npm-audit-app-autofix:
    name: Auto-fix — npm audit (app/frontend)
    needs: npm-audit-app
    if: >-
      always() &&
      needs.npm-audit-app.result == 'failure' &&
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      !startsWith(github.head_ref, 'auto-fix/')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.GH_PAT || github.token }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: npm audit fix
        run: npm audit fix
        working-directory: app/frontend
        continue-on-error: true

      - name: Open auto-fix PR
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GH_PAT || github.token }}
          commit-message: "fix(deps): npm audit fix for app/frontend"
          branch: auto-fix/audit-app-${{ github.event.pull_request.number }}
          base: ${{ github.head_ref }}
          delete-branch: true
          title: "fix(deps): npm audit fix for app/frontend (#${{ github.event.pull_request.number }})"
          body: |
            The `npm audit — app/frontend` check on #${{ github.event.pull_request.number }} failed,
            and `npm audit fix` was able to automatically resolve some or all of the
            flagged vulnerabilities.

            Merge this into the source branch to clear (or reduce) the audit failure.
          labels: |
            automated
            dependencies

  # ── npm audit — setup frontend ───────────────────────────────────────────────
  npm-audit-setup:
    name: npm audit — setup/frontend
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci
        working-directory: setup/windows/frontend

      - name: Run npm audit
        run: npm audit --audit-level=high
        working-directory: setup/windows/frontend

  # ── Auto-fix — npm audit (setup frontend) ────────────────────────────────────
  npm-audit-setup-autofix:
    name: Auto-fix — npm audit (setup/frontend)
    needs: npm-audit-setup
    if: >-
      always() &&
      needs.npm-audit-setup.result == 'failure' &&
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      !startsWith(github.head_ref, 'auto-fix/')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.GH_PAT || github.token }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: npm audit fix
        run: npm audit fix
        working-directory: setup/windows/frontend
        continue-on-error: true

      - name: Open auto-fix PR
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GH_PAT || github.token }}
          commit-message: "fix(deps): npm audit fix for setup/frontend"
          branch: auto-fix/audit-setup-${{ github.event.pull_request.number }}
          base: ${{ github.head_ref }}
          delete-branch: true
          title: "fix(deps): npm audit fix for setup/frontend (#${{ github.event.pull_request.number }})"
          body: |
            The `npm audit — setup/frontend` check on #${{ github.event.pull_request.number }} failed,
            and `npm audit fix` was able to automatically resolve some or all of the
            flagged vulnerabilities.

            Merge this into the source branch to clear (or reduce) the audit failure.
          labels: |
            automated
            dependencies

  # ── Secret / credential scanning ─────────────────────────────────────────────
  gitleaks:
    name: Secret scan — Gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so we can scan all commits in a PR

      - name: Install Gitleaks
        run: |
          GITLEAKS_VERSION="8.21.2"
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          sudo mv gitleaks /usr/local/bin/

      - name: Scan full repository history
        run: gitleaks detect --source . --exit-code 1 --redact

      - name: Scan commits introduced by this run
        if: github.event_name == 'pull_request'
        run: |
          gitleaks detect \
            --source . \
            --log-opts "origin/${{ github.base_ref }}..HEAD" \
            --exit-code 1 \
            --redact

  # ── OSV vulnerability scan (cross-ecosystem) ──────────────────────────────────
  # Uses the reusable workflow format required by osv-scanner-action v2+
  osv-scan:
    name: OSV — cross-ecosystem vulnerability scan
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.3.8
    with:
      scan-args: |-
        --recursive
        --skip-git
    permissions:
      security-events: write
      contents: read
      actions: read
