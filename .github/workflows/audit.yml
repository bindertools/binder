name: Dependency & Secret Audit

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    # Weekly full scan — Monday 06:00 UTC
    - cron: '0 6 * * 1'

permissions:
  contents: read
  security-events: write  # for uploading SARIF results

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: audit-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── npm audit — app frontend ──────────────────────────────────────────────────
  npm-audit-app:
    name: npm audit — app/frontend
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci
        working-directory: app/frontend

      - name: Run npm audit
        # Fail only on high or critical vulnerabilities
        run: npm audit --audit-level=high
        working-directory: app/frontend

  # ── Suggest — npm audit fix (app frontend) ────────────────────────────────────
  # When npm audit fails on a PR, run `npm audit fix` and post the resulting
  # lockfile diff as a PR comment so the update is easy to review and apply.
  npm-audit-app-suggest:
    name: Suggest — npm audit fix (app/frontend)
    needs: npm-audit-app
    if: >-
      always() &&
      needs.npm-audit-app.result == 'failure' &&
      github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci
        working-directory: app/frontend

      - name: npm audit fix
        run: npm audit fix
        working-directory: app/frontend
        continue-on-error: true

      - name: Capture lockfile diff
        id: diff
        run: |
          git diff -- app/frontend/package-lock.json app/frontend/package.json > /tmp/audit-app-diff.patch
          if [ -s /tmp/audit-app-diff.patch ]; then
            echo "has_diff=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_diff=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Post audit-fix suggestion
        if: steps.diff.outputs.has_diff == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let diff = fs.readFileSync('/tmp/audit-app-diff.patch', 'utf8');
            const limit = 50000;
            if (diff.length > limit) {
              diff = diff.slice(0, limit) + '\n... (diff truncated)';
            }

            const marker = '<!-- audit-fix-suggestion: app-frontend -->';
            const body = `${marker}\n` +
              `## 📦 npm audit fix available — app/frontend\n\n` +
              "The `npm audit — app/frontend` check failed. Running `npm audit fix` in `app/frontend` produces:\n\n" +
              "```diff\n" + diff + "\n```\n\n" +
              "Review and apply this locally, then commit the result.";

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
            });
            const existing = comments.find(c => c.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body,
              });
            }

  # ── npm audit — setup frontend ───────────────────────────────────────────────
  npm-audit-setup:
    name: npm audit — setup/frontend
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci
        working-directory: setup/windows/frontend

      - name: Run npm audit
        run: npm audit --audit-level=high
        working-directory: setup/windows/frontend

  # ── Suggest — npm audit fix (setup frontend) ──────────────────────────────────
  npm-audit-setup-suggest:
    name: Suggest — npm audit fix (setup/frontend)
    needs: npm-audit-setup
    if: >-
      always() &&
      needs.npm-audit-setup.result == 'failure' &&
      github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci
        working-directory: setup/windows/frontend

      - name: npm audit fix
        run: npm audit fix
        working-directory: setup/windows/frontend
        continue-on-error: true

      - name: Capture lockfile diff
        id: diff
        run: |
          git diff -- setup/windows/frontend/package-lock.json setup/windows/frontend/package.json > /tmp/audit-setup-diff.patch
          if [ -s /tmp/audit-setup-diff.patch ]; then
            echo "has_diff=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_diff=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Post audit-fix suggestion
        if: steps.diff.outputs.has_diff == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let diff = fs.readFileSync('/tmp/audit-setup-diff.patch', 'utf8');
            const limit = 50000;
            if (diff.length > limit) {
              diff = diff.slice(0, limit) + '\n... (diff truncated)';
            }

            const marker = '<!-- audit-fix-suggestion: setup-frontend -->';
            const body = `${marker}\n` +
              `## 📦 npm audit fix available — setup/frontend\n\n` +
              "The `npm audit — setup/frontend` check failed. Running `npm audit fix` in `setup/windows/frontend` produces:\n\n" +
              "```diff\n" + diff + "\n```\n\n" +
              "Review and apply this locally, then commit the result.";

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
            });
            const existing = comments.find(c => c.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body,
              });
            }

  # ── Secret / credential scanning ─────────────────────────────────────────────
  gitleaks:
    name: Secret scan — Gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so we can scan all commits in a PR

      - name: Install Gitleaks
        run: |
          GITLEAKS_VERSION="8.21.2"
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          sudo mv gitleaks /usr/local/bin/

      - name: Scan full repository history
        run: gitleaks detect --source . --exit-code 1 --redact

      - name: Scan commits introduced by this run
        if: github.event_name == 'pull_request'
        run: |
          gitleaks detect \
            --source . \
            --log-opts "origin/${{ github.base_ref }}..HEAD" \
            --exit-code 1 \
            --redact

  # ── OSV vulnerability scan (cross-ecosystem) ──────────────────────────────────
  # Uses the reusable workflow format required by osv-scanner-action v2+
  osv-scan:
    name: OSV — cross-ecosystem vulnerability scan
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.3.8
    with:
      scan-args: |-
        --recursive
        --skip-git
    permissions:
      security-events: write
      contents: read
      actions: read
