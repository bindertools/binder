name: Release Build

on:
  release:
    types:
      - published

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Three jobs run in parallel — each native runner builds for its own OS.

jobs:

  # ── Windows ──────────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 120
    defaults:
      run:
        shell: pwsh

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Bootstrap vcpkg
        run: |
          $vcpkgRoot = 'C:\vcpkg'
          if (-not (Test-Path "$vcpkgRoot\vcpkg.exe")) {
            git clone https://github.com/microsoft/vcpkg.git $vcpkgRoot
            & "$vcpkgRoot\bootstrap-vcpkg.bat" -disableMetrics
          }
          echo "VCPKG_ROOT=$vcpkgRoot" >> $env:GITHUB_ENV

      # Cache compiled vcpkg packages so OpenSSL and other slow builds are fast
      # on subsequent runs. Key includes vcpkg.json hash so cache invalidates
      # when dependencies change.
      - name: Cache vcpkg binary packages
        uses: actions/cache@v4
        with:
          path: C:\Users\runneradmin\AppData\Local\vcpkg\archives
          key: vcpkg-win-${{ hashFiles('cpp/vcpkg.json') }}
          restore-keys: vcpkg-win-

      - name: Build frontends
        run: |
          Set-Location app\frontend
          npm ci
          npm run build
          Set-Location $env:GITHUB_WORKSPACE

          Set-Location app\frontend
          $env:VITE_PLUGINS = 'true'
          npm run build
          Remove-Item Env:VITE_PLUGINS -ErrorAction SilentlyContinue
          Set-Location $env:GITHUB_WORKSPACE

          Set-Location installer\windows\frontend
          npm ci
          npm run build
          Set-Location $env:GITHUB_WORKSPACE

      - name: CMake configure (shared vcpkg_installed)
        run: |
          $toolchain = "C:\vcpkg\scripts\buildsystems\vcpkg.cmake"
          $overlayPorts = "cpp\ports"

          # Base build — vcpkg installs packages here
          cmake -B cpp\build -S cpp `
            "-DCMAKE_TOOLCHAIN_FILE=$toolchain" `
            "-DVCPKG_OVERLAY_PORTS=$overlayPorts"

          # Dev installer build — reuse the same vcpkg_installed to avoid
          # a second full package installation (especially OpenSSL)
          $sharedInstalled = (Resolve-Path cpp\build\vcpkg_installed).Path
          cmake -B cpp\build-dev -S cpp `
            "-DCMAKE_TOOLCHAIN_FILE=$toolchain" `
            "-DVCPKG_OVERLAY_PORTS=$overlayPorts" `
            "-DVCPKG_INSTALLED_DIR=$sharedInstalled" `
            "-DCMDIDE_INSTALLER_DEV=ON"

      - name: Build C++ targets
        run: |
          # Base app (frontend was built with no plugins — cmake copies to www/)
          cmake --build cpp\build --config Release --target cmdide-host

          # Stable installer
          cmake --build cpp\build --config Release --target cmdide-installer

          # Dev installer (uses shared vcpkg_installed)
          cmake --build cpp\build-dev --config Release --target cmdide-installer
          $devExe = "cpp\build-dev\Release\cmdide-installer.exe"
          if (Test-Path $devExe) {
            Copy-Item -Force $devExe "cpp\build\Release\cmdide-installer-dev.exe"
          }

          # Build plugins variant — rebuild frontend with plugins then re-copy www/
          $env:VITE_PLUGINS = 'true'
          Set-Location app\frontend; npm run build; Set-Location $env:GITHUB_WORKSPACE
          Remove-Item Env:VITE_PLUGINS -ErrorAction SilentlyContinue
          $distDir = "app\frontend\dist"
          $wwwDest = "cpp\build\Release\www"
          if (Test-Path $wwwDest) { Remove-Item -Recurse -Force $wwwDest }
          Copy-Item -Recurse $distDir $wwwDest

      - name: Stage and package artifacts
        run: |
          $rel = "cpp\build\Release"

          # Stage base (no plugins)
          $base = "$rel\cmdIDE-windows-amd64"
          New-Item -ItemType Directory -Force $base | Out-Null
          Copy-Item "$rel\cmdide-host.exe" "$base\cmdIDE-windows-amd64.exe"
          Get-ChildItem $rel -Filter '*.dll' | Copy-Item -Destination $base
          Copy-Item -Recurse "$rel\www" "$base\www"

          # Rebuild www/ with base (no-plugins) frontend for the base package
          # (the last cmake already put plugins in www/ -- swap it back for base)
          # Actually we need base frontend for base package:
          # Re-build base frontend and copy to base stage www/
          Remove-Item Env:VITE_PLUGINS -ErrorAction SilentlyContinue
          Set-Location app\frontend; npm run build; Set-Location $env:GITHUB_WORKSPACE
          Remove-Item -Recurse -Force "$base\www"
          Copy-Item -Recurse app\frontend\dist "$base\www"
          Compress-Archive -Path "$base\*" -DestinationPath "$rel\cmdIDE-windows-amd64.zip"
          Write-Host "  staged: cmdIDE-windows-amd64.zip"

          # Stage plugins variant
          $plugins = "$rel\cmdIDE-plugins-windows-amd64"
          New-Item -ItemType Directory -Force $plugins | Out-Null
          Copy-Item "$rel\cmdide-host.exe" "$plugins\cmdIDE-plugins-windows-amd64.exe"
          Get-ChildItem $rel -Filter '*.dll' | Copy-Item -Destination $plugins
          $env:VITE_PLUGINS = 'true'
          Set-Location app\frontend; npm run build; Set-Location $env:GITHUB_WORKSPACE
          Remove-Item Env:VITE_PLUGINS -ErrorAction SilentlyContinue
          Copy-Item -Recurse app\frontend\dist "$plugins\www"
          Compress-Archive -Path "$plugins\*" -DestinationPath "$rel\cmdIDE-plugins-windows-amd64.zip"
          Write-Host "  staged: cmdIDE-plugins-windows-amd64.zip"

      - name: Verify outputs
        run: |
          $rel = "cpp\build\Release"
          @(
            "$rel\cmdide-host.exe",
            "$rel\cmdide-installer.exe",
            "$rel\cmdIDE-windows-amd64.zip",
            "$rel\cmdIDE-plugins-windows-amd64.zip"
          ) | ForEach-Object {
            if (-not (Test-Path $_)) { throw "Missing: $_" }
            Write-Host "  found: $_" -ForegroundColor Green
          }

      - name: Self-sign executables
        run: |
          $cert = New-SelfSignedCertificate `
            -Type CodeSigningCert `
            -Subject "CN=Command IDE, O=Command IDE, C=US" `
            -KeyAlgorithm RSA -KeyLength 4096 -HashAlgorithm SHA256 `
            -CertStoreLocation "Cert:\CurrentUser\My" `
            -NotAfter (Get-Date).AddYears(10)

          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" `
            -Recurse -Filter signtool.exe -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -match 'x64' } |
            Sort-Object FullName -Descending | Select-Object -First 1 -ExpandProperty FullName

          if (-not $signtool) { throw "signtool.exe not found" }

          $rel = "cpp\build\Release"
          $files = @(
            "$rel\cmdide-host.exe",
            "$rel\cmdide-installer.exe"
          )
          if (Test-Path "$rel\cmdide-installer-dev.exe") {
            $files += "$rel\cmdide-installer-dev.exe"
          }

          foreach ($f in $files) {
            & $signtool sign /fd SHA256 /sha1 $cert.Thumbprint `
              /t http://timestamp.digicert.com `
              /d "Command IDE" /du "https://github.com/Command-IDE/cmd-ide" $f
            if ($LASTEXITCODE -ne 0) { throw "signtool failed on $f" }
            Write-Host "  signed: $f" -ForegroundColor Green
          }

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: cmdIDE-${{ github.event.release.tag_name }}-windows
          if-no-files-found: warn
          path: |
            cpp/build/Release/cmdIDE-windows-amd64.zip
            cpp/build/Release/cmdIDE-plugins-windows-amd64.zip

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.event.release.tag_name }}"
          $rel = "cpp/build/Release"
          foreach ($f in @("$rel/cmdIDE-windows-amd64.zip", "$rel/cmdIDE-plugins-windows-amd64.zip")) {
            if (Test-Path $f) {
              $name = Split-Path $f -Leaf
              gh release upload $tag "${f}#${name}" --clobber
            }
          }

  # ── macOS ────────────────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    timeout-minutes: 120
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          brew install cmake ninja create-dmg
          if [ ! -f "$HOME/vcpkg/vcpkg" ]; then
            git clone https://github.com/microsoft/vcpkg.git "$HOME/vcpkg"
            "$HOME/vcpkg/bootstrap-vcpkg.sh" -disableMetrics
          fi
          echo "VCPKG_ROOT=$HOME/vcpkg" >> $GITHUB_ENV

      - name: Cache vcpkg binary packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/vcpkg/archives
          key: vcpkg-macos-${{ hashFiles('cpp/vcpkg.json') }}
          restore-keys: vcpkg-macos-

      - name: Build
        run: |
          # Delete Windows-generated lockfiles so npm picks the correct macOS binary
          rm -f app/frontend/package-lock.json
          rm -f installer/windows/frontend/package-lock.json
          (cd app/frontend && npm install && npm run build)
          (cd installer/windows/frontend && npm install && npm run build)
          cmake -B cpp/build -S cpp \
            "-DCMAKE_TOOLCHAIN_FILE=$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" \
            "-DVCPKG_OVERLAY_PORTS=cpp/ports"
          cmake --build cpp/build --config Release --target cmdide-host

      - name: Package macOS .app
        run: |
          mkdir -p cmdIDE.app/Contents/MacOS
          # Try both possible output locations
          cp cpp/build/Release/cmdide-host cmdIDE.app/Contents/MacOS/cmdide 2>/dev/null || \
          cp cpp/build/cmdide-host cmdIDE.app/Contents/MacOS/cmdide 2>/dev/null || \
          cp cpp/build/host/Release/cmdide-host cmdIDE.app/Contents/MacOS/cmdide 2>/dev/null || true

          cat > cmdIDE.app/Contents/Info.plist <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>CFBundleName</key><string>cmdIDE</string>
            <key>CFBundleDisplayName</key><string>cmdIDE</string>
            <key>CFBundleExecutable</key><string>cmdide</string>
            <key>CFBundleIdentifier</key><string>com.cmdide.app</string>
            <key>NSHighResolutionCapable</key><true/>
            <key>LSMinimumSystemVersion</key><string>12.0</string>
          </dict></plist>
          PLIST

          codesign --deep --force --sign - cmdIDE.app 2>/dev/null || true

          # Copy www/ assets into the bundle
          if [ -d cpp/build/Release/www ]; then
            cp -r cpp/build/Release/www cmdIDE.app/Contents/Resources/
          fi

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: cmdIDE-${{ github.event.release.tag_name }}-macos
          if-no-files-found: warn
          path: cmdIDE.app

  # ── Linux ────────────────────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.1-dev \
            ninja-build libssl-dev \
            pkg-config curl zip unzip tar
          # cmake 4.x from Kitware (vcpkg 2025+ requires cmake >= 4.x)
          wget -qO- https://apt.kitware.com/keys/kitware-archive-latest.asc \
            | sudo gpg --dearmor -o /usr/share/keyrings/kitware-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/kitware-archive-keyring.gpg] \
            https://apt.kitware.com/ubuntu/ $(lsb_release -cs) main" \
            | sudo tee /etc/apt/sources.list.d/kitware.list
          sudo apt-get update -qq
          sudo apt-get install -y cmake

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Bootstrap vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git "$HOME/vcpkg"
          "$HOME/vcpkg/bootstrap-vcpkg.sh" -disableMetrics
          echo "VCPKG_ROOT=$HOME/vcpkg" >> $GITHUB_ENV

      - name: Cache vcpkg binary packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/vcpkg/archives
          key: vcpkg-linux-${{ hashFiles('cpp/vcpkg.json') }}
          restore-keys: vcpkg-linux-

      - name: Build
        run: |
          # Delete Windows-generated lockfiles so npm picks the correct Linux binary
          rm -f app/frontend/package-lock.json
          rm -f installer/windows/frontend/package-lock.json
          (cd app/frontend && npm install && npm run build)
          (cd installer/windows/frontend && npm install && npm run build)
          cmake -B cpp/build -S cpp \
            "-DCMAKE_TOOLCHAIN_FILE=$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" \
            "-DVCPKG_OVERLAY_PORTS=cpp/ports"
          cmake --build cpp/build --config Release --target cmdide-host

      - name: Package Linux tar.gz
        run: |
          mkdir -p cmdide-linux-amd64
          # Find the output binary
          find cpp/build -name "cmdide-host" -type f 2>/dev/null | head -1 | xargs -I{} cp {} cmdide-linux-amd64/cmdide-host || true
          # Include www/ assets
          if [ -d cpp/build/Release/www ]; then
            cp -r cpp/build/Release/www cmdide-linux-amd64/
          fi
          tar -czf cmdIDE-linux-amd64.tar.gz cmdide-linux-amd64/

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: cmdIDE-${{ github.event.release.tag_name }}-linux
          if-no-files-found: warn
          path: cmdIDE-linux-amd64.tar.gz

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -f cmdIDE-linux-amd64.tar.gz ]; then
            gh release upload "${{ github.event.release.tag_name }}" \
              "cmdIDE-linux-amd64.tar.gz#cmdIDE-linux-amd64.tar.gz" --clobber
          fi
