name: Release Build

on:
  release:
    types:
      - published

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ── Windows ──────────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 120
    defaults:
      run:
        shell: pwsh

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Bootstrap vcpkg
        run: |
          $vcpkgRoot = 'C:\vcpkg'
          if (-not (Test-Path "$vcpkgRoot\vcpkg.exe")) {
            git clone https://github.com/microsoft/vcpkg.git $vcpkgRoot
            & "$vcpkgRoot\bootstrap-vcpkg.bat" -disableMetrics
          }
          echo "VCPKG_ROOT=$vcpkgRoot" >> $env:GITHUB_ENV

      # Cache compiled vcpkg packages — avoids recompiling OpenSSL every run
      - name: Cache vcpkg binary packages
        uses: actions/cache@v4
        with:
          path: C:\Users\runneradmin\AppData\Local\vcpkg\archives
          key: vcpkg-win-static-${{ hashFiles('cpp/vcpkg.json') }}
          restore-keys: vcpkg-win-static-

      - name: Build all artifacts
        run: ./build.ps1 -Version "${{ github.event.release.tag_name }}"
        # build.ps1 automatically uses x64-windows-static on Windows for standalone exes

      - name: Verify outputs
        run: |
          $rel = "cpp\build\Release"
          @(
            "$rel\Binder-windows-amd64.exe",
            "$rel\Binder-setup-windows.exe",
            "$rel\Binder-setup-dev-windows.exe"
          ) | ForEach-Object {
            if (-not (Test-Path $_)) { throw "Missing: $_" }
            Write-Host "  found: $_" -ForegroundColor Green
          }

      - name: Self-sign executables
        run: |
          $cert = New-SelfSignedCertificate `
            -Type CodeSigningCert `
            -Subject "CN=Binder, O=BinderTools, C=US" `
            -KeyAlgorithm RSA -KeyLength 4096 -HashAlgorithm SHA256 `
            -CertStoreLocation "Cert:\CurrentUser\My" `
            -NotAfter (Get-Date).AddYears(10)

          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" `
            -Recurse -Filter signtool.exe -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -match 'x64' } |
            Sort-Object FullName -Descending | Select-Object -First 1 -ExpandProperty FullName

          if (-not $signtool) { throw "signtool.exe not found" }

          $rel = "cpp\build\Release"
          $files = @(
            "$rel\Binder-windows-amd64.exe",
            "$rel\Binder-setup-windows.exe",
            "$rel\Binder-setup-dev-windows.exe"
          )
          foreach ($f in $files) {
            if (-not (Test-Path $f)) { continue }
            & $signtool sign /fd SHA256 /sha1 $cert.Thumbprint `
              /t http://timestamp.digicert.com `
              /d "Binder" /du "https://github.com/BinderTools/binder" $f
            if ($LASTEXITCODE -ne 0) { throw "signtool failed on $f" }
            Write-Host "  signed: $f" -ForegroundColor Green
          }

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.event.release.tag_name }}"
          $rel = "cpp/build/Release"
          $files = @(
            @{ path = "$rel/Binder-windows-amd64.exe";     label = "Binder-windows-amd64.exe" },
            @{ path = "$rel/Binder-setup-windows.exe";     label = "Binder-setup-windows.exe" },
            @{ path = "$rel/Binder-setup-dev-windows.exe"; label = "Binder-setup-dev-windows.exe" }
          )
          foreach ($f in $files) {
            if (Test-Path $f.path) {
              gh release upload $tag "$($f.path)#$($f.label)" --clobber
              Write-Host "  uploaded: $($f.label)" -ForegroundColor Green
            }
          }

  # ── macOS ────────────────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    timeout-minutes: 120
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          brew install cmake ninja create-dmg
          if [ ! -f "$HOME/vcpkg/vcpkg" ]; then
            git clone https://github.com/microsoft/vcpkg.git "$HOME/vcpkg"
            "$HOME/vcpkg/bootstrap-vcpkg.sh" -disableMetrics
          fi
          echo "VCPKG_ROOT=$HOME/vcpkg" >> $GITHUB_ENV

      - name: Cache vcpkg binary packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/vcpkg/archives
          key: vcpkg-macos-${{ hashFiles('cpp/vcpkg.json') }}
          restore-keys: vcpkg-macos-

      - name: Build
        run: |
          rm -f app/frontend/package-lock.json
          (cd app/frontend && npm install && npm run build)
          cmake -B cpp/build -S cpp \
            "-DCMAKE_TOOLCHAIN_FILE=$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" \
            "-DVCPKG_OVERLAY_PORTS=cpp/ports"
          cmake --build cpp/build --config Release --target binder-host

      - name: Package macOS .app
        run: |
          mkdir -p Binder.app/Contents/MacOS
          find cpp/build -name "binder-host" -not -path "*/CMakeFiles/*" | head -1 \
            | xargs -I{} cp {} Binder.app/Contents/MacOS/binder || true
          # Copy www/ assets into the bundle
          [ -d cpp/build/Release/www ] && cp -r cpp/build/Release/www Binder.app/Contents/Resources/ || true

          {
            echo '<?xml version="1.0" encoding="UTF-8"?>'
            echo '<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">'
            echo '<plist version="1.0"><dict>'
            echo '  <key>CFBundleName</key><string>Binder</string>'
            echo '  <key>CFBundleDisplayName</key><string>Binder</string>'
            echo '  <key>CFBundleExecutable</key><string>binder</string>'
            echo '  <key>CFBundleIdentifier</key><string>com.binder.app</string>'
            echo '  <key>NSHighResolutionCapable</key><true/>'
            echo '  <key>LSMinimumSystemVersion</key><string>12.0</string>'
            echo '</dict></plist>'
          } > Binder.app/Contents/Info.plist
          codesign --deep --force --sign - Binder.app 2>/dev/null || true

          # Create DMG
          create-dmg --volname "Binder" --window-size 600 400 \
            --icon-size 100 --app-drop-link 450 180 \
            Binder-darwin-arm64.dmg Binder.app || \
          zip -r Binder-darwin-arm64.zip Binder.app

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ github.event.release.tag_name }}"
          if [ -f Binder-darwin-arm64.dmg ]; then
            gh release upload "$tag" "Binder-darwin-arm64.dmg#Binder-darwin-arm64.dmg" --clobber
          elif [ -f Binder-darwin-arm64.zip ]; then
            gh release upload "$tag" "Binder-darwin-arm64.zip#Binder-darwin-arm64.zip" --clobber
          fi

  # ── Linux ────────────────────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev \
            ninja-build libssl-dev pkg-config curl zip unzip tar
          wget -qO- https://apt.kitware.com/keys/kitware-archive-latest.asc \
            | sudo gpg --dearmor -o /usr/share/keyrings/kitware-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/kitware-archive-keyring.gpg] \
            https://apt.kitware.com/ubuntu/ $(lsb_release -cs) main" \
            | sudo tee /etc/apt/sources.list.d/kitware.list
          sudo apt-get update -qq && sudo apt-get install -y cmake

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Bootstrap vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git "$HOME/vcpkg"
          "$HOME/vcpkg/bootstrap-vcpkg.sh" -disableMetrics
          echo "VCPKG_ROOT=$HOME/vcpkg" >> $GITHUB_ENV

      - name: Cache vcpkg binary packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/vcpkg/archives
          key: vcpkg-linux-${{ hashFiles('cpp/vcpkg.json') }}
          restore-keys: vcpkg-linux-

      - name: Build
        run: |
          rm -f app/frontend/package-lock.json
          (cd app/frontend && npm install && npm run build)
          cmake -B cpp/build -S cpp \
            "-DCMAKE_TOOLCHAIN_FILE=$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" \
            "-DVCPKG_OVERLAY_PORTS=cpp/ports"
          cmake --build cpp/build --config Release --target binder-host

      - name: Package Linux tar.gz
        run: |
          mkdir -p binder-linux-amd64
          find cpp/build -name "binder-host" -not -path "*/CMakeFiles/*" | head -1 \
            | xargs -I{} cp {} binder-linux-amd64/binder-host || true
          [ -d cpp/build/Release/www ] && cp -r cpp/build/Release/www binder-linux-amd64/ || true
          tar -czf Binder-linux-amd64.tar.gz binder-linux-amd64/

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -f Binder-linux-amd64.tar.gz ]; then
            gh release upload "${{ github.event.release.tag_name }}" \
              "Binder-linux-amd64.tar.gz#Binder-linux-amd64.tar.gz" --clobber
          fi
