name: Release Build

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: windows-latest
    timeout-minutes: 60
    env:
      GOCACHE: ${{ github.workspace }}\.cache\go-build

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            app/frontend/package-lock.json
            installer/frontend/package-lock.json

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: app/go.mod
          cache-dependency-path: |
            app/go.sum
            installer/go.sum

      - name: Install Wails CLI
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0
          $goBin = Join-Path (go env GOPATH) 'bin'
          $goBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build release binaries
        run: ./build.ps1

      - name: Verify build outputs
        run: |
          $expected = @(
            'app\build\bin\cmdIDE.exe',
            'installer\build\bin\cmdIDE-installer.exe'
          )

          foreach ($path in $expected) {
            if (-not (Test-Path $path)) {
              throw "Missing expected build output: $path"
            }
          }

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cmdIDE-${{ github.event.release.tag_name }}-windows
          if-no-files-found: error
          path: |
            app/build/bin/cmdIDE.exe
            installer/build/bin/cmdIDE-installer.exe

      - name: Upload binaries to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" `
            "installer/build/bin/cmdIDE-installer.exe#cmdIDE-installer.exe" `
            "app/build/bin/cmdIDE.exe#cmdIDE.exe" `
            --clobber
