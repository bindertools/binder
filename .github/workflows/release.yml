name: Release Build

on:
  release:
    types:
      - published

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Three jobs run in parallel — each native runner builds for its own OS.

jobs:

  # ── Windows ──────────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 90
    defaults:
      run:
        shell: pwsh

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Bootstrap vcpkg
        run: |
          $vcpkgRoot = 'C:\vcpkg'
          if (-not (Test-Path "$vcpkgRoot\vcpkg.exe")) {
            git clone https://github.com/microsoft/vcpkg.git $vcpkgRoot
            & "$vcpkgRoot\bootstrap-vcpkg.bat" -disableMetrics
          }
          echo "VCPKG_ROOT=$vcpkgRoot" >> $env:GITHUB_ENV

      - name: Build
        run: ./build.ps1 -Version "${{ github.event.release.tag_name }}" -DevInstaller

      - name: Verify outputs
        run: |
          @(
            'cpp\build\Release\cmdide-host.exe',
            'cpp\build\Release\cmdide-installer.exe'
          ) | ForEach-Object {
            if (-not (Test-Path $_)) { throw "Missing: $_" }
            Write-Host "  found: $_" -ForegroundColor Green
          }

      - name: Self-sign executables
        run: |
          $cert = New-SelfSignedCertificate `
            -Type CodeSigningCert `
            -Subject "CN=Command IDE, O=Command IDE, C=US" `
            -KeyAlgorithm RSA -KeyLength 4096 -HashAlgorithm SHA256 `
            -CertStoreLocation "Cert:\CurrentUser\My" `
            -NotAfter (Get-Date).AddYears(10)

          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" `
            -Recurse -Filter signtool.exe -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -match 'x64' } |
            Sort-Object FullName -Descending | Select-Object -First 1 -ExpandProperty FullName

          if (-not $signtool) { throw "signtool.exe not found" }

          $files = @(
            'cpp\build\Release\cmdide-host.exe',
            'cpp\build\Release\cmdide-installer.exe'
          )
          if (Test-Path 'cpp\build\Release\cmdide-installer-dev.exe') {
            $files += 'cpp\build\Release\cmdide-installer-dev.exe'
          }

          foreach ($f in $files) {
            & $signtool sign /fd SHA256 /sha1 $cert.Thumbprint `
              /t http://timestamp.digicert.com `
              /d "Command IDE" /du "https://github.com/Command-IDE/cmd-ide" $f
            if ($LASTEXITCODE -ne 0) { throw "signtool failed on $f" }
            Write-Host "  signed: $f" -ForegroundColor Green
          }

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: cmdIDE-${{ github.event.release.tag_name }}-windows
          if-no-files-found: error
          path: cpp/build/Release/cmdIDE-windows-amd64.zip

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.event.release.tag_name }}"
          $zip = "cpp/build/Release/cmdIDE-windows-amd64.zip"
          if (Test-Path $zip) {
            gh release upload $tag "$zip#cmdIDE-windows-amd64.zip" --clobber
          }

  # ── macOS ────────────────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    timeout-minutes: 90
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          brew install cmake ninja create-dmg
          # vcpkg
          if [ ! -f "$HOME/vcpkg/vcpkg" ]; then
            git clone https://github.com/microsoft/vcpkg.git "$HOME/vcpkg"
            "$HOME/vcpkg/bootstrap-vcpkg.sh" -disableMetrics
          fi
          echo "VCPKG_ROOT=$HOME/vcpkg" >> $GITHUB_ENV

      - name: Build
        run: |
          # Delete Windows-generated package-lock.json so npm install picks the
          # correct macOS Rollup native binary (Vite 7 / Rollup v4 requirement).
          rm -f app/frontend/package-lock.json
          rm -f installer/windows/frontend/package-lock.json
          # Install npm deps and build frontends
          (cd app/frontend && npm install && npm run build)
          (cd installer/windows/frontend && npm install && npm run build)
          # CMake configure + build
          cmake -B cpp/build -S cpp \
            "-DCMAKE_TOOLCHAIN_FILE=$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" \
            "-DVCPKG_OVERLAY_PORTS=cpp/ports"
          cmake --build cpp/build --config Release --target cmdide-host

      - name: Package macOS .app
        run: |
          mkdir -p cmdIDE.app/Contents/MacOS
          cp cpp/build/cmdide cmdIDE.app/Contents/MacOS/cmdide 2>/dev/null || \
          cp cpp/build/Release/cmdide cmdIDE.app/Contents/MacOS/cmdide 2>/dev/null || true
          # Create minimal Info.plist
          cat > cmdIDE.app/Contents/Info.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>CFBundleName</key><string>cmdIDE</string>
            <key>CFBundleExecutable</key><string>cmdide</string>
            <key>CFBundleIdentifier</key><string>com.cmdide.app</string>
            <key>CFBundleVersion</key><string>${{ github.event.release.tag_name }}</string>
            <key>NSHighResolutionCapable</key><true/>
          </dict></plist>
          EOF
          codesign --deep --force --sign - cmdIDE.app 2>/dev/null || true

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: cmdIDE-${{ github.event.release.tag_name }}-macos
          if-no-files-found: warn
          path: cmdIDE.app

  # ── Linux ────────────────────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.1-dev \
            ninja-build libssl-dev \
            pkg-config curl zip unzip tar
          # cmake 4.x from Kitware (vcpkg 2025+ requires cmake >= 4.x)
          wget -qO- https://apt.kitware.com/keys/kitware-archive-latest.asc \
            | sudo gpg --dearmor -o /usr/share/keyrings/kitware-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/kitware-archive-keyring.gpg] \
            https://apt.kitware.com/ubuntu/ $(lsb_release -cs) main" \
            | sudo tee /etc/apt/sources.list.d/kitware.list
          sudo apt-get update -qq
          sudo apt-get install -y cmake

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Bootstrap vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git "$HOME/vcpkg"
          "$HOME/vcpkg/bootstrap-vcpkg.sh" -disableMetrics
          echo "VCPKG_ROOT=$HOME/vcpkg" >> $GITHUB_ENV

      - name: Build
        run: |
          # Delete Windows-generated package-lock.json for Linux Rollup binary
          rm -f app/frontend/package-lock.json
          rm -f installer/windows/frontend/package-lock.json
          (cd app/frontend && npm install && npm run build)
          (cd installer/windows/frontend && npm install && npm run build)
          cmake -B cpp/build -S cpp \
            "-DCMAKE_TOOLCHAIN_FILE=$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" \
            "-DVCPKG_OVERLAY_PORTS=cpp/ports"
          cmake --build cpp/build --config Release --target cmdide-host

      - name: Package Linux tar.gz
        run: |
          mkdir -p cmdide-linux-amd64
          cp cpp/build/cmdide cmdide-linux-amd64/ 2>/dev/null || \
          cp cpp/build/Release/cmdide cmdide-linux-amd64/ 2>/dev/null || true
          tar -czf cmdIDE-linux-amd64.tar.gz cmdide-linux-amd64/

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: cmdIDE-${{ github.event.release.tag_name }}-linux
          if-no-files-found: warn
          path: cmdIDE-linux-amd64.tar.gz

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -f cmdIDE-linux-amd64.tar.gz ]; then
            gh release upload "${{ github.event.release.tag_name }}" \
              "cmdIDE-linux-amd64.tar.gz#cmdIDE-linux-amd64.tar.gz" --clobber
          fi
