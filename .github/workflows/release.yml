name: Release Build

on:
  release:
    types:
      - published

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Three jobs run in parallel — each native runner builds for its own OS.
# build.ps1 handles symbol stripping.

jobs:

  # ── Windows ──────────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 60
    env:
      GOCACHE: ${{ github.workspace }}\.cache\go-build
    defaults:
      run:
        shell: pwsh

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-go@v5
        with:
          go-version-file: app/go.mod
          cache-dependency-path: app/go.sum

      - name: Install Wails
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0
          Join-Path (go env GOPATH) 'bin' | Out-File $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build
        run: ./build.ps1 -NoUpx -NoArchive -Version "${{ github.event.release.tag_name }}"

      - name: Verify outputs
        run: |
          @(
            'app/build/bin/cmdIDE-windows-amd64.exe',
            'app/build/bin/cmdIDE-plugins-windows-amd64.exe',
            'app/build/bin/cmdIDE-installer-windows.exe'
          ) | ForEach-Object {
            if (-not (Test-Path $_)) { throw "Missing: $_" }
            Write-Host "  found: $_" -ForegroundColor Green
          }

      # ── Self-sign with a CI-generated certificate ─────────────────────────────
      # A self-signed Authenticode signature costs $0 and requires no external
      # service. It moves the binaries from "unsigned" to "signed" which causes
      # many AV engines (Defender included) to skip the heuristic pass that
      # flags unfamiliar binaries. The cert is created fresh each run inside the
      # runner's certificate store — nothing is stored or transmitted externally.
      # DigiCert's public timestamp server is used so the signature remains valid
      # after the ephemeral cert's notional expiry.
      - name: Self-sign executables
        run: |
          # Generate a 4096-bit RSA code-signing cert in the runner's user store
          $cert = New-SelfSignedCertificate `
            -Type CodeSigningCert `
            -Subject "CN=Command IDE, O=Command IDE, C=US" `
            -KeyAlgorithm RSA `
            -KeyLength 4096 `
            -HashAlgorithm SHA256 `
            -CertStoreLocation "Cert:\CurrentUser\My" `
            -NotAfter (Get-Date).AddYears(10)

          # Locate signtool.exe from the Windows SDK (always present on windows-latest)
          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" `
            -Recurse -Filter signtool.exe -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -match 'x64' } |
            Sort-Object FullName -Descending |
            Select-Object -First 1 -ExpandProperty FullName

          if (-not $signtool) { throw "signtool.exe not found" }

          $files = @(
            'app/build/bin/cmdIDE-windows-amd64.exe',
            'app/build/bin/cmdIDE-plugins-windows-amd64.exe',
            'app/build/bin/cmdIDE-installer-windows.exe'
          )

          foreach ($f in $files) {
            # Sign with SHA-256 + free DigiCert timestamp so signature never expires
            & $signtool sign `
              /fd SHA256 `
              /sha1 $cert.Thumbprint `
              /t http://timestamp.digicert.com `
              /d "Command IDE" `
              /du "https://github.com/Command-IDE/cmd-ide" `
              $f
            if ($LASTEXITCODE -ne 0) { throw "signtool failed on $f" }
            Write-Host "  signed: $f" -ForegroundColor Green
          }

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: cmdIDE-${{ github.event.release.tag_name }}-windows
          if-no-files-found: error
          path: |
            app/build/bin/cmdIDE-windows-amd64.exe
            app/build/bin/cmdIDE-plugins-windows-amd64.exe
            app/build/bin/cmdIDE-installer-windows.exe

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" `
            "app/build/bin/cmdIDE-windows-amd64.exe#cmdIDE-windows-amd64.exe" `
            "app/build/bin/cmdIDE-plugins-windows-amd64.exe#cmdIDE-plugins-windows-amd64.exe" `
            "app/build/bin/cmdIDE-installer-windows.exe#cmdIDE-installer-windows.exe" `
            --clobber

  # ── macOS ────────────────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    timeout-minutes: 60
    defaults:
      run:
        shell: pwsh

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-go@v5
        with:
          go-version-file: app/go.mod
          cache-dependency-path: app/go.sum

      - name: Install Wails
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0
          Join-Path (go env GOPATH) 'bin' | Out-File $env:GITHUB_PATH -Encoding utf8 -Append

      # macOS produces .app bundles (directories) — zip is required for distribution.
      # UPX is skipped as it breaks codesign/Gatekeeper.

      - name: Build
        run: pwsh ./build.ps1 -NoUpx

      - name: Verify outputs
        run: |
          @(
            'app/build/bin/cmdIDE-darwin-arm64.zip',
            'app/build/bin/cmdIDE-plugins-darwin-arm64.zip',
            'app/build/bin/cmdIDE-installer-darwin.zip'
          ) | ForEach-Object {
            if (-not (Test-Path $_)) { throw "Missing: $_" }
            Write-Host "  found: $_" -ForegroundColor Green
          }

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: cmdIDE-${{ github.event.release.tag_name }}-macos
          if-no-files-found: error
          path: |
            app/build/bin/cmdIDE-darwin-arm64.zip
            app/build/bin/cmdIDE-plugins-darwin-arm64.zip
            app/build/bin/cmdIDE-installer-darwin.zip

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            "app/build/bin/cmdIDE-darwin-arm64.zip#cmdIDE-darwin-arm64.zip" \
            "app/build/bin/cmdIDE-plugins-darwin-arm64.zip#cmdIDE-plugins-darwin-arm64.zip" \
            "app/build/bin/cmdIDE-installer-darwin.zip#cmdIDE-installer-darwin.zip" \
            --clobber

  # ── Linux ────────────────────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        shell: pwsh

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        shell: bash
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-go@v5
        with:
          go-version-file: app/go.mod
          cache-dependency-path: app/go.sum

      - name: Install Wails
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0
          Join-Path (go env GOPATH) 'bin' | Out-File $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build
        run: pwsh ./build.ps1 -NoUpx -NoArchive

      - name: Verify outputs
        run: |
          @(
            'app/build/bin/cmdIDE-linux-amd64',
            'app/build/bin/cmdIDE-plugins-linux-amd64',
            'app/build/bin/cmdIDE-installer-linux'
          ) | ForEach-Object {
            if (-not (Test-Path $_)) { throw "Missing: $_" }
            Write-Host "  found: $_" -ForegroundColor Green
          }

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: cmdIDE-${{ github.event.release.tag_name }}-linux
          if-no-files-found: error
          path: |
            app/build/bin/cmdIDE-linux-amd64
            app/build/bin/cmdIDE-plugins-linux-amd64
            app/build/bin/cmdIDE-installer-linux

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            "app/build/bin/cmdIDE-linux-amd64#cmdIDE-linux-amd64" \
            "app/build/bin/cmdIDE-plugins-linux-amd64#cmdIDE-plugins-linux-amd64" \
            "app/build/bin/cmdIDE-installer-linux#cmdIDE-installer-linux" \
            --clobber
