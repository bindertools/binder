name: Test Coverage

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write  # to post coverage comment on PRs

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: coverage-${{ github.ref }}
  cancel-in-progress: true

jobs:

  go-coverage:
    name: Go — test coverage
    runs-on: windows-latest
    timeout-minutes: 30
    env:
      GOCACHE: ${{ github.workspace }}\.cache\go-build
    defaults:
      run:
        shell: pwsh

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GH_PAT || github.token }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-go@v5
        with:
          go-version-file: app/go.mod
          cache-dependency-path: app/go.sum

      # Frontend embed must exist before go test can compile the package
      - name: Install frontend dependencies
        run: npm.cmd ci
        working-directory: app/frontend

      - name: Build frontend
        run: npm.cmd run build
        working-directory: app/frontend

      - name: Run tests with coverage
        run: |
          go test ./... `
            -coverprofile=coverage.out `
            -covermode=atomic `
            -timeout 120s
        working-directory: app

      - name: Print coverage summary
        run: |
          go tool cover -func=coverage.out |
            Select-String -Pattern 'total' |
            ForEach-Object { Write-Host $_ }
        working-directory: app

      - name: Generate HTML coverage report
        run: go tool cover -html=coverage.out -o coverage.html
        working-directory: app

      - name: Upload coverage report (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage-${{ github.sha }}
          path: app/coverage.html
          retention-days: 30

      # Post coverage as a PR comment so reviewers see the number without
      # needing to download the artifact.
      - name: Extract total coverage percentage
        id: cov
        run: |
          $line = go tool cover -func=coverage.out |
            Select-String 'total' |
            Select-Object -Last 1
          # The line ends with e.g. "65.3%"
          $pct = ($line -split '\s+')[-1]
          "pct=$pct" | Out-File $env:GITHUB_OUTPUT -Append
        working-directory: app

      - name: Comment coverage on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const pct = '${{ steps.cov.outputs.pct }}';
            const sha  = context.payload.pull_request.head.sha.slice(0, 7);
            const body = `### Go Test Coverage\n\n` +
                         `**${pct}** of statements covered (commit ${sha}).\n\n` +
                         `Download the full HTML report from the workflow [artifacts](` +
                         `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}` +
                         `/actions/runs/${context.runId}).`;

            // Replace existing coverage comment instead of spamming new ones
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.payload.pull_request.number,
            });
            const existing = comments.find(c =>
              c.user.login === 'github-actions[bot]' &&
              c.body.startsWith('### Go Test Coverage')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body,
              });
            }
