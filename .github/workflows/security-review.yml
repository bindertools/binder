name: Security Review

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: '17 8 * * 1'

permissions:
  actions: read
  contents: read
  security-events: write

concurrency:
  group: security-review-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codeql:
    runs-on: windows-latest
    timeout-minutes: 45
    env:
      GOCACHE: ${{ github.workspace }}\.cache\go-build

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: go,javascript-typescript
          build-mode: manual
          queries: security-extended

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            app/frontend/package-lock.json
            installer/frontend/package-lock.json

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: app/go.mod
          cache-dependency-path: |
            app/go.sum
            installer/go.sum

      - name: Install app frontend dependencies
        run: npm.cmd ci
        working-directory: app/frontend

      - name: Install installer frontend dependencies
        run: npm.cmd ci
        working-directory: installer/frontend

      - name: Build app frontend
        run: npm.cmd run build
        working-directory: app/frontend

      - name: Build installer frontend
        run: npm.cmd run build
        working-directory: installer/frontend

      - name: Build app Go module for analysis
        run: go build ./...
        working-directory: app

      - name: Build installer Go module for analysis
        run: go build ./...
        working-directory: installer

      - name: Analyze with CodeQL
        uses: github/codeql-action/analyze@v3
