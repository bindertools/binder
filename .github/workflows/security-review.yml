name: Security Review

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: '17 8 * * 1'

permissions:
  actions: read
  contents: read
  security-events: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: security-review-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codeql:
    name: CodeQL — ${{ matrix.language }}
    runs-on: windows-latest
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        include:
          # Go analysis removed — no Go code remains after Phase N
          - language: javascript-typescript
            build-mode: none

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-extended

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install app frontend dependencies
        run: npm.cmd ci
        working-directory: app/frontend

      - name: Install installer frontend dependencies
        run: npm.cmd ci
        working-directory: installer/windows/frontend

      - name: Analyze with CodeQL
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
